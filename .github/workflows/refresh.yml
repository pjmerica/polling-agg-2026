name: Daily refresh

on:
  schedule:
    # Two refreshes/day: 12:00 UTC = 08:00 ET (morning), 00:00 UTC = 20:00 ET
    # (evening). GitHub cron is best-effort, actual fire time can lag
    # by 5-30 min.
    - cron: '0 12 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:  # manual button in Actions tab

# Shared group with market-refresh.yml so the two workflows never race
# each other's commit step.
concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run full pipeline
        run: python -u run_all.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data refresh: $(date -u +%Y-%m-%dT%H:%MZ)"
            # Retry-with-rebase loop to handle race conditions when a manual
            # push lands between checkout and push (3 attempts).
            for i in 1 2 3; do
              if git push; then break; fi
              echo "Push rejected, rebasing on origin/master (attempt $i)…"
              git pull --rebase origin master
            done
          fi
