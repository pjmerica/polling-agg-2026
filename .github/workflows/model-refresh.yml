name: Model refresh

# Regenerates MODEL predictions daily so they keep up with the poll feed (which the
# other two workflows refresh 2x daily / 2-hourly). Before this existed, predictions
# only updated when refresh_dashboard.py was run by hand — the Raw Polls tab would walk
# a week ahead of the model (seen 2026-07-16: polls Jul-15 vs model Jul-7).
#
# Design: the model repo (pjmerica/Polls-prediction-model) is PUBLIC, so this workflow
# clones it read-only — no cross-repo token. The directory layout must mirror the local
# machines' sibling layout because the model code uses relative paths:
#   $GITHUB_WORKSPACE/Polling prediction model/                       (model repo)
#   $GITHUB_WORKSPACE/Polling Agg/Polling agg and Prediction markets/ (this repo)
# Runs at 13:15 UTC, after the 12:00 UTC daily poll refresh, in the shared 'refresh'
# concurrency group so it never races the other workflows' commits.

on:
  # THE set process for new polls: "Daily refresh" is the workflow that fetches polls
  # (00:00 + 12:00 UTC); the moment it completes, this fires and re-predicts. The cron
  # is only a backstop in case a Daily refresh run fails outright.
  workflow_run:
    workflows: ["Daily refresh"]
    types: [completed]
  schedule:
    - cron: '15 13 * * *'
  workflow_dispatch:

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  model-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          path: 'Polling Agg/Polling agg and Prediction markets'

      - uses: actions/checkout@v5
        with:
          repository: pjmerica/Polls-prediction-model
          path: 'Polling prediction model'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: 'Polling prediction model/requirements.txt'

      - run: |
          pip install -r "Polling prediction model/requirements.txt"
          pip install -r "Polling Agg/Polling agg and Prediction markets/requirements.txt"

      # the market CSVs are gitignored (regenerated 2-hourly, never committed), so a
      # fresh checkout has none - scrape them or model_compare*.py crashes on read.
      # Bonus: the compares price against markets fetched minutes ago, not hours.
      - name: Scrape market prices (kalshi + polymarket)
        working-directory: 'Polling Agg/Polling agg and Prediction markets'
        run: |
          python -u scrapers/kalshi.py
          python -u scrapers/polymarket.py

      - name: Predict + explain + compare (all three models)
        working-directory: 'Polling prediction model'
        run: python -u refresh_dashboard.py --no-feeds

      - name: Commit and push predictions
        working-directory: 'Polling Agg/Polling agg and Prediction markets'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed docs/model_data.js docs/primary_model_data.js
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "model refresh: $(date -u +%Y-%m-%dT%H:%MZ)"
            # a market-refresh commit can land between checkout and push. On rejection:
            # rebase, then reconcile BOTH kinds of derived files (learned the hard way
            # 2026-07-18 when data/processed conflicts stalled the loop):
            #   - data/processed/* = model outputs -> restore OUR fresh copies from the
            #     model repo checkout (never merge-resolve these)
            #   - docs/*.js = generated -> REGENERATE from source, never merge-resolve
            CONFLICTABLE="docs/model_data.js docs/primary_model_data.js \
              data/processed/model_predictions_2026.csv \
              data/processed/model_margin_predictions_2026.csv \
              data/processed/model_predictions_meta.json \
              data/processed/model_primary_predictions_2026.csv \
              data/processed/model_primary_predictions_meta.json \
              data/processed/model_primary_explanations_2026.json \
              data/processed/model_explanations_2026.json"
            for i in 1 2 3; do
              if git push; then break; fi
              echo "Push rejected (attempt $i)"
              if ! git pull --rebase origin master; then
                git checkout --theirs $CONFLICTABLE 2>/dev/null || true
                git add $CONFLICTABLE
                GIT_EDITOR=true git rebase --continue || git rebase --abort
              fi
              # our model outputs win; refresh_dashboard already copied them, but a
              # --theirs above may have clobbered them - recopy from the model checkout
              cp ../../"Polling prediction model"/predictions_2026.csv \
                 data/processed/model_predictions_2026.csv 2>/dev/null || true
              cp ../../"Polling prediction model"/primary_predictions_2026.csv \
                 data/processed/model_primary_predictions_2026.csv 2>/dev/null || true
              python analysis/model_compare.py
              python analysis/model_compare_primary.py
              git add docs data/processed
              git diff --cached --quiet || git commit -m "regen post-rebase"
            done
          fi
