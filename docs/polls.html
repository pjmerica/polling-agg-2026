<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Poll Explorer</title>
<script src="polls_data.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  header { padding: 20px 28px 14px; border-bottom: 1px solid #1e2433; display: flex; align-items: baseline; gap: 24px; flex-wrap: wrap; }
  header h1 { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
  nav a { font-size: 0.8rem; color: #4f6ef7; text-decoration: none; }
  nav a:hover { text-decoration: underline; }

  .layout { display: flex; height: calc(100vh - 57px); }

  /* ── sidebar ── */
  .sidebar { width: 300px; min-width: 260px; border-right: 1px solid #1e2433; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-top { padding: 12px; border-bottom: 1px solid #1e2433; display: flex; flex-direction: column; gap: 8px; }
  .sidebar-top input, .sidebar-top select { width: 100%; background: #1a2035; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 6px; padding: 7px 10px; font-size: 0.82rem; }
  .sidebar-top input::placeholder { color: #4a5568; }
  .filter-row { display: flex; gap: 6px; }
  .filter-row select { flex: 1; }
  .over50-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #94a3b8; cursor: pointer; }
  .over50-toggle input[type=checkbox] { accent-color: #facc15; width: 14px; height: 14px; cursor: pointer; }

  .race-list { flex: 1; overflow-y: auto; }
  .race-item { padding: 10px 14px; border-bottom: 1px solid #161b27; cursor: pointer; transition: background 0.1s; }
  .race-item:hover { background: #1a2035; }
  .race-item.active { background: #1e2d50; border-left: 3px solid #4f6ef7; }
  .race-item .race-label { font-weight: 600; font-size: 0.88rem; color: #e2e8f0; display: flex; align-items: center; gap: 6px; }
  .race-item .race-meta { font-size: 0.72rem; color: #64748b; margin-top: 2px; }
  .flag-50 { display: inline-block; background: rgba(250,204,21,0.18); color: #facc15; border-radius: 4px; padding: 1px 5px; font-size: 0.65rem; font-weight: 700; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 99px; font-size: 0.65rem; font-weight: 700; }
  .badge.SEN { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .badge.GOV { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge.H   { background: rgba(96,165,250,0.15);  color: #60a5fa; }

  /* ── detail pane ── */
  .detail { flex: 1; overflow-y: auto; padding: 20px 28px 40px; }
  .detail-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #2d3748; font-size: 1rem; }

  .detail-header { margin-bottom: 20px; }
  .detail-header h2 { font-size: 1.2rem; font-weight: 700; }
  .detail-header p { font-size: 0.78rem; color: #64748b; margin-top: 4px; }

  .stage-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .stage-tab { padding: 5px 14px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid #2d3748; color: #64748b; background: transparent; }
  .stage-tab.active { background: #1e2d50; border-color: #4f6ef7; color: #93c5fd; }

  .poll-card { background: #131822; border: 1px solid #1e2433; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .poll-card.has-flag { border-color: rgba(250,204,21,0.4); }
  .poll-header { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid #1a2230; }
  .poll-header-left { display: flex; flex-direction: column; gap: 2px; }
  .poll-pollster { font-size: 0.85rem; font-weight: 600; color: #e2e8f0; }
  .poll-meta { font-size: 0.72rem; color: #64748b; }
  .poll-badges { display: flex; gap: 6px; align-items: center; }
  .partisan-badge { background: rgba(248,113,113,0.12); color: #f87171; border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; font-weight: 700; }
  .stage-badge { background: #1e2433; color: #64748b; border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; }
  .over50-badge { background: rgba(250,204,21,0.18); color: #facc15; border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; font-weight: 700; }

  .candidates { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
  .cand-row { display: flex; align-items: center; gap: 10px; }
  .cand-name { width: 180px; font-size: 0.82rem; color: #e2e8f0; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cand-party { width: 28px; text-align: center; font-size: 0.65rem; font-weight: 700; flex-shrink: 0; }
  .cand-party.D { color: #60a5fa; }
  .cand-party.R { color: #f87171; }
  .cand-party.I { color: #a78bfa; }
  .cand-party.NONE { color: #4a5568; }
  .bar-bg { flex: 1; background: #1e2433; border-radius: 3px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .cand-pct { width: 42px; text-align: right; font-size: 0.82rem; font-weight: 600; flex-shrink: 0; }
  .over-50-marker { font-size: 0.65rem; color: #facc15; font-weight: 700; flex-shrink: 0; }

  .empty-msg { color: #4a5568; font-size: 0.85rem; padding: 20px 0; text-align: center; }

  @media (max-width: 700px) {
    .layout { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: 50vh; border-right: none; border-bottom: 1px solid #1e2433; }
  }
</style>
</head>
<body>

<header>
  <h1>2026 Poll Explorer</h1>
  <nav><a href="index.html">← Back to Dashboard</a></nav>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <input type="text" id="search" placeholder="Search race, state…">
      <div class="filter-row">
        <select id="filter-office">
          <option value="ALL">All offices</option>
          <option value="SEN">Senate</option>
          <option value="GOV">Governor</option>
          <option value="H">House</option>
        </select>
        <select id="filter-stage">
          <option value="ALL">All stages</option>
          <option value="general">General</option>
          <option value="primary">Primary</option>
        </select>
      </div>
      <label class="over50-toggle">
        <input type="checkbox" id="only-over50">
        Show only races with a candidate &gt;50%
      </label>
    </div>
    <div class="race-list" id="race-list"></div>
  </div>

  <div class="detail" id="detail">
    <div class="detail-placeholder">Select a race to see polls</div>
  </div>
</div>

<script>
let activeRaceId = null;
let filterOffice = 'ALL';
let filterStage = 'ALL';
let searchQ = '';
let onlyOver50 = false;

// ── render sidebar ────────────────────────────────────────────────────────────
function filteredRaces() {
  return POLLS.filter(r => {
    if (filterOffice !== 'ALL' && r.office !== filterOffice) return false;
    if (onlyOver50 && r.n_over50 === 0) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      if (!r.label.toLowerCase().includes(q) && !r.state.toLowerCase().includes(q)) return false;
    }
    // stage filter: check if any poll matches
    if (filterStage !== 'ALL') {
      if (!r.polls.some(p => p.stage === filterStage)) return false;
    }
    return true;
  });
}

function renderSidebar() {
  const races = filteredRaces();
  const el = document.getElementById('race-list');
  if (races.length === 0) {
    el.innerHTML = '<div class="empty-msg">No races match filters</div>';
    return;
  }
  el.innerHTML = races.map(r => `
    <div class="race-item${r.race_id === activeRaceId ? ' active' : ''}" data-id="${r.race_id}">
      <div class="race-label">
        <span class="badge ${r.office}">${r.office}</span>
        ${r.label}
        ${r.n_over50 > 0 ? `<span class="flag-50">50%+ ×${r.n_over50}</span>` : ''}
      </div>
      <div class="race-meta">${r.state} &nbsp;·&nbsp; ${r.n_polls} poll${r.n_polls !== 1 ? 's' : ''}</div>
    </div>
  `).join('');

  el.querySelectorAll('.race-item').forEach(el => {
    el.addEventListener('click', () => {
      activeRaceId = el.dataset.id;
      renderSidebar();
      renderDetail();
    });
  });
}

// ── render detail ─────────────────────────────────────────────────────────────
let activeStageTab = 'ALL';

function renderDetail() {
  const race = POLLS.find(r => r.race_id === activeRaceId);
  const el = document.getElementById('detail');
  if (!race) {
    el.innerHTML = '<div class="detail-placeholder">Select a race to see polls</div>';
    return;
  }

  // Available stages
  const stages = ['ALL', ...new Set(race.polls.map(p => p.stage))].filter((s, i, a) => a.indexOf(s) === i);

  // Filter polls
  let polls = race.polls;
  if (activeStageTab !== 'ALL') polls = polls.filter(p => p.stage === activeStageTab);
  if (filterStage !== 'ALL') polls = polls.filter(p => p.stage === filterStage);

  const stageTabsHtml = stages.map(s => `
    <button class="stage-tab${activeStageTab === s ? ' active' : ''}" data-stage="${s}">
      ${s === 'ALL' ? 'All' : s.charAt(0).toUpperCase() + s.slice(1)}
    </button>
  `).join('');

  const pollsHtml = polls.map(p => {
    const flagHtml = p.any_over50 ? `<span class="over50-badge">50%+ flag</span>` : '';
    const partisanHtml = p.partisan ? `<span class="partisan-badge">Partisan</span>` : '';
    const stageHtml = `<span class="stage-badge">${p.stage}</span>`;
    const nHtml = p.sample_size ? `n=${p.sample_size.toLocaleString()}` : '';

    const candsHtml = p.candidates.map(c => {
      const pct = c.pct;
      const barColor = c.party === 'DEM' || c.party === 'D' ? '#3b82f6'
                     : c.party === 'REP' || c.party === 'R' ? '#ef4444'
                     : '#a78bfa';
      const barW = Math.min(100, pct);
      const markerHtml = c.over50 ? `<span class="over-50-marker">▲50%</span>` : '';
      const partyCode = c.party === 'DEM' ? 'D' : c.party === 'REP' ? 'R' : (c.party || 'NONE');
      return `<div class="cand-row">
        <span class="cand-party ${partyCode}">${partyCode}</span>
        <span class="cand-name" title="${c.name}">${c.name}</span>
        <div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:${barColor};opacity:${0.5 + 0.5 * (barW / 100)}"></div></div>
        <span class="cand-pct" style="color:${c.over50 ? '#facc15' : '#94a3b8'}">${pct}%</span>
        ${markerHtml}
      </div>`;
    }).join('');

    return `<div class="poll-card${p.any_over50 ? ' has-flag' : ''}">
      <div class="poll-header">
        <div class="poll-header-left">
          <span class="poll-pollster">${p.pollster}</span>
          <span class="poll-meta">${p.end_date}${nHtml ? ' &nbsp;·&nbsp; ' + nHtml : ''}</span>
        </div>
        <div class="poll-badges">${stageHtml}${partisanHtml}${flagHtml}</div>
      </div>
      <div class="candidates">${candsHtml}</div>
    </div>`;
  }).join('') || '<div class="empty-msg">No polls for this filter</div>';

  el.innerHTML = `
    <div class="detail-header">
      <h2>${race.label} — ${race.state}</h2>
      <p>${race.n_polls} poll${race.n_polls !== 1 ? 's' : ''} &nbsp;·&nbsp; ${race.n_over50} with a candidate over 50%</p>
    </div>
    <div class="stage-tabs">${stageTabsHtml}</div>
    ${pollsHtml}
  `;

  el.querySelectorAll('.stage-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeStageTab = btn.dataset.stage;
      renderDetail();
    });
  });
}

// ── wire controls ─────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  renderSidebar();
});
document.getElementById('filter-office').addEventListener('change', e => {
  filterOffice = e.target.value;
  renderSidebar();
});
document.getElementById('filter-stage').addEventListener('change', e => {
  filterStage = e.target.value;
  renderSidebar();
  renderDetail();
});
document.getElementById('only-over50').addEventListener('change', e => {
  onlyOver50 = e.target.checked;
  renderSidebar();
});

// ── init ──────────────────────────────────────────────────────────────────────
renderSidebar();
// Auto-select first race
if (POLLS.length > 0) {
  activeRaceId = POLLS[0].race_id;
  renderSidebar();
  renderDetail();
}
</script>
</body>
</html>
